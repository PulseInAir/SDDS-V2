name: Bootstrap npm lockfile

on:
  push:
    branches:
      - codex/g02-quality-gates

permissions:
  contents: write

jobs:
  lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: codex/g02-quality-gates

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Generate lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit lockfile
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: generate npm lockfile"
          git push origin HEAD:codex/g02-quality-gates
