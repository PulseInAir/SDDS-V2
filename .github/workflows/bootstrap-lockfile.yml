name: Bootstrap npm lockfile

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  generate-and-commit-lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies and generate lockfile
        run: npm install --ignore-scripts

      - name: Run quality checks
        run: npm run check

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Commit generated lockfile
        run: |
          if [ -z "$(git status --porcelain -- package-lock.json)" ]; then
            echo "package-lock.json is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: generate npm lockfile"
          git push origin HEAD:${{ github.head_ref }}
